[entity-description]
pm-welder=Un four qui ne produit que des alliages. Il nécessite son propre carburant spécial.
pm-seawater-extractor=Une pompe basique. Elle tire de l'eau de mer et la conduit sur terre.
pm-dirty-boiler=Une chaudière rudimentaire, et plus polluante. Elle fonctionne à l'eau de mer.
pm-vacuum-former-1=Un bâtiment pouvant créer des moules et autres objets à partir de plastique ou de résine.
pm-burn-inator=Un bâtiment qui vous permet de se débarrasser du trop-plein des gaz et fluides. Mais il est très polluant et gourmand en énergie.
pm-bio-wall=Un mur créé à partir de bactéries aliens. Il peut se régénérer de part lui-même.
pm-hub-beacon=Transmet l'effet des modules aux entités amicales proches. Il possède une plus grande zone d'effet, et une diminution des rendements plus lente. Mais cela est au prix d'une plus grande taille, d'un facteur de transmission réduit et d'un coût énergétique plus important.
pm-proximity-beacon=Transmet l'effet des modules aux entités amicales proches. Il possède un meilleur facteur de transmission, et est plus petit. Mais cela est au prix d'une plus petite zone d'effet et une diminution des rendements plus rapide.
electric-furnace=Nécessite l'usage d'échangeurs à spirales pour atteindre sa vitesse normal.
pm-electric-furnace-2=Nécessite l'usage d'échangeurs à spirales pour atteindre sa vitesse normal. Il peut prendre plus d'échangeurs que son prédécesseur.
pm-heat-furnace=Nécessite l'usage d'échangeurs à spirales pour atteindre sa vitesse normal. Il peut prendre plus d'échangeurs que son prédécesseur.
pm-electric-boiler-1=Transforme l'eau en vapeur grâce à de l'électricité. Nécessite plus de puissance qu'une chaudière traditionnelle, faute à la seconde loi de la thermodynamique.
pm-air-filterer=Ne peut fonctionner que si son tronçon de carte est pollué.
pm-coil-heater=Transmet l'effet des échangeurs à spirales aux entités amicales compatibles proches. Son rayon n'est que d'une seule tuile, et plusieurs donnent des rendements exponentiels.
pm-osmium-pipe=Ne peut se connecter aux autres tuyaux. (ex. [img=item.pipe])
pm-osmium-pipe-to-ground=Ne peut se connecter aux autres tuyaux. (ex. [img=item.pipe-to-ground])
pm-electric-mining-drill-3=Une foreuse plus avancée, capable d'extraire 33% plus de minerai par gisement, cumulable avec les bonus de productivité.
requester-chest=Il est possible d'agrandir son inventaire avec des recherches (maximum de 9).
buffer-chest=Seul les robots peuvent insérer et retirer des objets de ce coffre.
pm-tidal-power-plant=Doit être placé sur l'eau pour pouvoir fonctionner.

cooled-nuclear-reactor=Utilise des barres d'uranium pour générer de la chaleur. La production de chaleur augmente lorsqu'il est adjacent à d'autres réacteurs. Nécessite un apport constant d'[img=fluid.water],  de [img=fluid.pm-coolant] ou de [img=fluid.pm-light-coolant] pour pouvoir refroidir, et surtout, ne pas exploser.
cooled-pm-polonium-reactor=Utilise des barres de polonium pour générer de la chaleur. La production de chaleur augmente lorsqu'il est adjacent à d'autres réacteurs. Nécessite un apport constant d'[img=fluid.water],  de [img=fluid.pm-coolant] ou de [img=fluid.pm-light-coolant] pour pouvoir refroidir, et surtout, ne pas exploser.
pm-greenhouse=[color=255,230,192][font=default-semibold]Pollution maximale possible dans son tronçon de carte :[/font][/color] [color=148,19,19]□[/color]
pm-factorian-bacteria-greenhouse=[color=255,230,192][font=default-semibold]Pollution maximale possible dans son tronçon de carte :[/font][/color] [color=148,19,19]□[/color]


