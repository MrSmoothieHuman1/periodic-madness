[technology-description]
pm-cleaner-power-generation=De meilleures techniques, et un meilleur filtrage permet de générer plus d'énergie.
pm-alloying=Les basiques de la production d'alliages.
pm-water-distillation=Développement de processus de raffinage et d'utilisation de l'eau.
logistic-science-pack=Le deuxième niveau du raffinage des métaux de transition. Débloque de nouvelles recettes et de nouveaux minerais.
pm-advanced-transition-metal-refining=Méthodes de raffinage de minerai utilisant un nouvel acide, plus puissant.
pm-gold-processing=Nouvelles manières d'utiliser l'or et ses propriétés.
pm-welder-1-unlock=Une soudeuse basique, permettant de créer des alliages.
pm-mercury-processing=Le procédé permettant de raffiner et traiter le mercure.
pm-stainless-steel-processing=Une version plus versatile et résistante de l'acier.
pm-byproduct-handling=Méthodes permettant de traiter les résidus du raffinage minier.
pm-electronic-circuit-molding=Une méthode alternative pour fabriquer les breadboards, utilisant de la résine au lieu du métal.
pm-wood-processing=De nouvelles manières d'utiliser le bois dans vos usines.
pm-resin-processing=Les moyens de fabriquer des matériaux pré-plastiques.
pm-rubber-processing=Une résine adaptée à la création de caoutchouc
pm-pheonlic-resin-processing=Une résine adaptée à la création de composants électroniques.
pm-fiberoptics=La création de fibres de verre permet la transition quasi instantanée d'informations.
pm-logistics=En utilisant des structures à faible densité, il est possible d'avoir une friction minimale sur les convoyeurs, permettant un plus grand débit.
pm-ezekiel-ore-purifying=En utilisant des faibles doses d'acide chlorhydrique, il est possible d'extraire le minerai pur du minerai brut.
pm-voltatic-piles=En empilant des disques de cuivre et de zinc, il est possible de stocker de l'énergie de manière relativement sûre.
pm-tempature-plating=En utilisant une mixture de différents métaux superposés, vous pouvez maintenant contrôler les forces terrifiantes que sont ... le chaud et le froid.
pm-advanced-basic-tubing=Utiliser des matériaux plus avancés permet d'obtenir plus de produits. Qui l'eut cru ?
pm-diesel-fuel-canisters=Le diesel peut être utilisé comme carburant, et permet une bonne vitesse et une bonne longévité.
pm-kerosene-fuel-canisters=Le kérosène peut être utilisé comme carburant, et permet une très bonne longévité mais une faible vitesse.
pm-petrol-fuel-canisters=L'essence peut être utilisée comme carburant, et permet une très bonne vitesse mais une faible longévité.
pm-advanced-refinery-gas-recipes=Avec un catalyseur, il est possible d'obtenir de meilleurs résultats.
pm-advanced-advanced-transition-metal-pack-unlock=Le niveau supérieur des métaux de transition, permettant la production de meilleurs métaux.
pm-basic-polyethylene-plastic=Un moyen rudimentaire de créer du plastique polyéthylène. Pas très efficace, mais suffisant.
pm-vanadium-oxide-redox-batteries=En mélangeant des solutions positives et négatives d'oxyde de vanadium, il est possible de fabriquer une batterie pouvant stocker de l'énergie.
pm-metharicephentine=je me déteste
chemical-science-pack=Technologies et recettes faisant usage des non-métaux communs. Débloque la condensation atmosphérique et d'autres technologies.
pm-tempature-inators=Des bâtiments pouvant utiliser la pleine puissance du chaud ou du froid, permettant de manipuler les métaux en fusion.
pm-copper-tin-solder=Un alliage de métal de soudure sans plomb. Utile pour l'électronique avancée.
pm-CO2-nullifying=Au lieu d'utilisé des procédés chimique pour se débarrasser du dioxyde de carbone, il est possible d'utiliser une pseudo-plante liquide capable de le réduire en carbone et oxygène brut.
pm-plastic-science-packs=Comme le plastique est plus résistant que le verre, il permet de produire plus de science.
pm-trace-gas-refining=En séparant les gaz résiduels, il est possible d'en extraire des gaz industriels très utiles.
pm-fluid-circuit=Un circuit électronique plus avancé, capable de résister aux liquides.
pm-chromic-acid-leeching=Grâce à un acide plus potent, il est possible de traiter plus facilement les minerais.
pm-washing-plant=Une usine de lavage plus avancée et résistante.
pm-pollution-filtering=Un bâtiment capable de combattre Opération : Nuage Noir.
pm-chemical-resin=En utilisant des techniques plus avancées, il est possible de synthétiser des molécules précises, permettant la production de meilleures résines.
pm-advanced-polyethylene-plastic=En utilisant le bisphénol A comme base, il est possible de fabriquer plus efficacement du plastique polyéthylène.
pm-molten-alloys=L'utilisation de métaux déjà fondus permet la production plus efficace d'alliages.
pm-advanced-advanced-transition-metal-refining=Le niveau supérieur du raffinage des métaux de transition, permettant la production de minerais plus avancés.
pm-fluid-circuit-molding=Une méthode alternative de créer des circuits étanches.
pm-advanced-circuit-molding=Une méthode alternative de créer des circuits avancés.
pm-anti-bacterial-multiproperty-multimetals=En utilisant des métaux ayant des propriétés anti-bactériennes innées, il devient possible de créer de nouveaux produits biologiques.
pm-vacuum-former=Un bâtiment pouvant manipuler et mouler les matériaux en utilisant des résines et plastiques.
pm-greenhouse=Un environnement stérilisé permet de faire pousser du bois, à l'aide de gaz atmosphériques.
pm-glass-melting=Si vous savez faire fondre des métaux, pourquoi ne savez-vous pas comment faire fondre un matériau très délicat et facilement cass- Ah. C'est pour ça.
pm-science-center=Un laboratoire plus avancé, capable de traiter un plus grand nombre de packs de science. Il est aussi plus grand tout court, mais plus rapide.
pm-atmospheric-condensation=L'art de voler les gaz atmosphériques de cette planète alien, très similaires à ceux de la Terre, sauf une différence majeure, la présence de beaucoup de chlore.
pm-phosphor-processing=En filtrant et broyant, il est possible d'utiliser le phosphore pour des procédés biologiques.
pm-plastic-reactive-non-metal-pack=Plastique + science = plus de science !
pm-bio-modules=Une technologie S.F. qui devrait vraiment n'apparaitre que plus loin dans l'arbre de recherche. Une capsule, similaire à un module, contenant des génomes spécifiques, vous permettant d'améliorer votre corps.
pm-bio-module-agility=En utilisant le génome de phosphoramidite, vous pouvez améliorer votre portée et vitesse, vous rendant plus efficace.
pm-bio-module-health=En utilisant le génome de CISD2, vous pouvez artificiellement rendre votre corps plus sain, tel un milliardaire essayant d'atteindre la vie éternelle. Vous n'êtes plus qu'un simple même.
pm-bio-module-strength=En utilisant le génome de myostatine, vous pouvez augmenter votre masse musculaire, donc votre force, vous permettant de transporter plus d'objets, et plus rapidement.
pm-circuit-megassembler=Le premier de la franchise MÉGA (pas encore déposé, car problèmes avec les avocats de Sonic). La mégausine de circuits électroniques est capable de fabriquer des circuits à une vitesse incroyable, grâce à l'incroyable invention qu'est le lubrifiant.
pm-multimetal-multiproperty=De nouveaux types d'objets métalliques peuvent être produits en utilisant de nouveaux métaux avec des propriétés spécifiques.
pm-bio-laboratory=Un bâtiment de recherche spécialement conçu pour gérer les bio-modules.
pm-agar-storage=Les boîtes de Petri sont une bien meilleure méthode de transport pour l'agar-agar et les bactéries.
pm-sulfuric-acid-dilution=Dans un univers alternatif, avec 5 planètes dans ce système solaire, un pauvre ingénieur utilise la calcite pour neutraliser ses acides. Un peu de vol, et un peu d'adaptation à votre univers, et vous pouvez maintenant diluer vos acides.
pm-chlorine-processing=Le traitement du chlore. Faîtes attention à ne pas le respirer !
pm-cadnium-processing=[insérer une blague marrante, brisant le 4ᵉ mur]
pm-post-transition-metal-pack-unlock=L'autre chemin scientifique, celui-ci débloque de meilleures alternatives aux processus déjà connus, et quelques nouveaux trucs avec lesquelles s'amuser.
pm-stainles-steel-piping=Des tuyaux, mais inoxydables.
pm-advanced-mining-drill=Une foreuse plus rapide et efficace.
pm-crystallisation=En utilisant un bâtiment spécialisé, vous pouvez faire germer des cristaux, permettant de nouveaux processus plus efficaces. Oui, cette technologie est massive. Essayez donc vous, de trouver une meilleure manière de faire des technologies symétriques.
pm-indium-processing=L'extraction et le traitement d'un métal spécialisé, l'indium.
pm-solar-energy=De meilleurs panneaux solaires, produisant plus d'énergie, mais toujours inutile la nuit.
pm-polonium-processing=c'est chaud.
pm-flourine-processing=Un élément cristallin, utilisé dans les flux de brasage, et pour garder vos dents blanches.
pm-grouped-plastic-science-tier=Les packs de science en plastique sont une manière plus efficace de créer de la science, ils nécessitent le même nombre de ressources pour créer deux packs de science.
pm-bismuth-CO2-electrolysis=Le bismuth peut aussi être utilisé dans l'électrolyse du dioxyde de carbone, à la place du zirconium.
pm-advanced-byproduct-handling=De meilleures méthodes pour traiter les résidus du raffinage de métaux.
pm-alternative-crystallizer-recipes=Méthodes alternatives pour fabriquer des produits à base de cristaux.
pm-radiation-resistant-multimetals=Des objets métalliques capables de résister aux radiations alpha, bêta et gamma.
pm-tempature-framing=Châssis métallique pouvant résister à des températures extrêmes.
pm-processing-circuit-molding=Une méthode alternative de créer des breadboards de processeur.
pm-cobalt-processing=Aussi bleu que ... euh ... un truc bleu. Je n'ai pas mieux.
pm-solar-panel-equipment=Des panneaux solaires portatifs plus avancés, produisant plus d'énergie pour la même taille.
pm-burn-inators=Machine cousine, permettant de brûler certains fluides et gaz.
pm-zirconium-processing=Un métal rouge foncé, utile pour les céramiques et les processus biologiques.
pm-oil-cracking-and-reforming=Méthodes permettant de transformer du pétrole lourd en léger, en inversement.
pm-platinum-processing=Le grand frère du palladium, moins utile.
pm-polymethyl-methacrylate=Un autre type de plastique qui peut remplacer le verre.
pm-crystal-seeding=Un moyen de créer une quantité infinie de cristaux, à partir d'un cristal germe et un échantillon du cristal désiré. Buvez un shot quand je dis "cristal".
pm-speed-module=Un module de vitesse plus avancé, faisant travailler les machines plus rapidement. Certains disent qu'il y a des flammes sur le côté pour encore plus augmenter la vitesse. Impossible à confirmer cependant. (non, je n'ai pas copié ça car j'avais la flemme, j'ai demandé gentiment.)
pm-efficiency-module=Un module d'effectivité (mince le nom a changé en 2.0) overclocké qui augmente la vitesse des machines tout en réduisant leur consommation énergétique. Pas de flammes, malheureusement.
pm-productivity-module=Un module de productivité très productif, il chuchote dans l'oreille des machines qu'elles ont plus de ressources, cela leur permet de créer plus de produits avec les mêmes ressources. Malheureusement, cela viole plusieurs lois de ... plein de trucs. Heuresement, ceci est un jeu. Arrêtez de lire ça et aggrandissez l'usine.
pm-chemical-weaponry=Pensez-vous que le joueur reste derrière son écran, car il craint lui aussi ce qu'il a créé ?
pm-lithium-ion-battery=Une batterie plus avancée, qui peut stocker plus d'énergie que ses prédécesseurs, tout en durant plus longtemps et en étant plus résistant.
pm-lithium-sulfur-battery=Une batterie à plus grande capacité, mais inutilisable pour les machines industrielles.
pm-alkali-metal-pack-unlock=Le deuxième niveau de ce chemin, débloquant des améliorations et des matériaux avancés.
pm-lithium-construction-robotics=Des robots de constructions plus avancés, ils sont plus rapides et plus efficaces que leurs prédécesseurs.
pm-lithium-logistic-robotics=Des robots logistiques plus avancés, ils sont plus rapides et plus efficaces que leurs prédécesseurs.
pm-robot-battery-capacity=Augmente la capacité des batteries des robots logistiques et de construction.
pm-worker-robots-storage=Augmente le nombre d'objets que les robots logistiques et de construction peuvent transporter en même temps.
pm-advanced-atmospheric-condensation=si vous lisez ce texte depuis une capture d'écran, vous pouvez recevoir un euro à la con, valable dans n'importe quel magasin à la con. (et le droit à une mention dans un nom scientifique d'Alien Industries Inc.)
pm-bromide-PMMA=En utilisant du bromure de vinyle comme réactif, il devient possible de créer plus de PMMA à partir de moins de ressources.
pm-bromine-processing=Le traitement du brome, un élément similaire au chlore et au fluor : il ne faut pas le respirer ! (peu m'importe, je ne suis pas tes parents)
pm-electrolysis-plant-2=Un électrolyseur plus avancé qui me permet de créer des recettes plus complexes sans avoir besoin de centaines d'électrolyseurs.
pm-better-sulfur-extraction=En apprenant les préfixes des oxydes, il devient possible de créer plus facilement de l'acide sulfurique.
pm-iodine-processing=imaginez oublier deux éléments des non-métaux communs. pourrait pas être moi.
pm-FUCK-transition-metal-science-pack=Le premier niveau d'utilisation du francium pour créer des packs de science des métaux de transition.
pm-FUCK-advanced-transition-metal-science-pack=Le deuxième niveau d'utilisation du francium pour créer des packs de science avancés des métaux de transition.
pm-FUCK-advanced-advanced-transition-metal-science-pack=Le troisième niveau d'utilisation du francium pour créer des packs de science très avancés des métaux de transition.
pm-FUCK-post-transition-metal-science-pack=Le quatrième niveau d'utilisation du francium pour créer des packs de science des métaux pauvres.
pm-FUCK-reactive-non-metals-science-pack=Le quatrième niveau d'utilisation du francium pour créer des packs de science des non-métaux communs.
pm-ethylene-carbonate=Un électrolyte utile dans la production de batteries.
pm-vanadium-chromium-alloying=L'utilisation du vanadium et du chrome en tant qu'additif dans les alliages permet des recettes plus efficaces.
pm-basic-battery-charging=Une manière plus avancée de recharger les batteries.
pm-advanced-battery-charging=Des batteries plus avancées permettant de stocker plus d'énergie.
pm-lead-bismuth-solder=En utilisant du plomb ou du bismuth, il est possible de produire plus efficacement des métaux de soudure.
pm-tin-molten-glass-casting=L'utilisation de l'étain pour faire fondre du verre permet que ça fonde ... plus mieux, et réduit les chances de fractures.
pm-metalloid-pack-unlock=Le deuxième niveau de ce chemin, débloquant de nouveaux métaux et de nouveau procédés.
pm-arsenic-antimony-processing=Les procédés d'extraction de deux éléments très toxiques, l'arsenic et l'antimoine. Pourquoi est-ce que seuls ces deux éléments sont bien traités comme étant toxiques ? Pour éviter d'avoir à créer trop de technologies bien sûr !
pm-tellurium-processing=Un matériau noir utile dans des procédés biologiques et photovoltaïques.
rocket-silo=Permet de lancer une fusée dans l’espace et de gagner la partie.
pm-molybdenum-processing=La production du molybdène, un élément utile dans le traitement du pétrole, et probablement d'autres trucs.
pm-fertiliser=Un moyen de palier la perte d'efficacité de la pousse des plantes.
pm-lithium-processing=J'espère que vous avez gardé vos plans de lavage de la boue de Seablock !
pm-polytetrafluoroethylene-plastic=Un plastique très résistant à la corrosion. Il est utilisé pour la fabrication de récepteurs radios et dans l'usinage.
pm-FUCK=Une mystérieuse machine d'une ancienne civilisation, la signification de son nom et acronyme ont été perdus dans les pages de l'histoire, mais les crânes chauves de vos laboratoires ont découvert qu'elle peut utiliser du francium pour créer des packs de science.
pm-mining-productivity=Augmente les rendements de toutes les foreuses électriques et de tous les chevalets de pompage.
pm-research-productivity=Rend les pratiques de recherche plus productives.
pm-laboratory=Un bâtiment capable d'utiliser des packs de science pour la recherche.
pm-silicon-processing=Un élément brillant, thermorésistant, dur à produire, qui devait être ajouté au début du jeu. Utile dans l'électronique.
pm-boron-processing=Un métalloïde orange foncé, utile dans la fonte des métaux et des procédés chimiques.
pm-borosilicate-glass=Un nouveau type de verre, plus résistant, mais plus dur à produire.
pm-molten-potassium-glass=Une méthode plus efficace pour produire du verre.
pm-intermediate-casting=L'utilisation de moules plus avancés, permettant le moulage de pièces plus avancées.
pm-advanced-electronic-components=L'utilisation de métalloïdes pour faire des trucs électroniques plus mieux.
pm-oil-fractions-burning=Il manque encore l'incinérateur à fluides, car les conduites de chaleur sont chiantes et je n'arrivais pas à faire marcher ça correctement. Je sais que cette technologie paraît bizarre pour le moment, mais attendez la prochaine mise à jour.
pm-astatine-processing=L'un des éléments les plus rares de la planète, utilisable dans des recettes spéciales qui peuvent produire des ressources radioactives.
pm-concrete-walls=Des murs plus résistants, pouvant protéger votre usine.
pm-bio-walls=Des murs infestés par une bactérie de cette planète. Ils sont un peu plus fragiles, mais ils sont capables de s'autoréparer.
pm-alakline-earth-metal-pack-unlock=Le troisième et dernier pack de science de ce niveau.
pm-RTG=Un GTR est un petit générateur, alimenté par des matériaux radioactifs. Il peut produire une faible quantité d'énergie pendant très longtemps, très utile pour mettre en place un avant-poste.
pm-express-inserters=Des bras robotisés encore plus rapides.
pm-crushing=La possibilité de broyer des matériaux, pour en créer de nouveaux.
pm-waste-water-byproduct-handling=Le traitement des résidus, extrayant des matériaux plus utiles.
pm-heating-coils=Des composants spéciaux, qui ne fonctionnent que dans les bâtiments thermiques. Ils sont nécessaires pour atteindre une vitesse de production acceptable.
pm-kasethal-heating-coils=Grâce à la haute capacité thermique du canthal, il est utile dans la création d'échangeurs à spirales.
pm-electric-boiler=Permet la création de machines capables de créer de la vapeur grâce à seulement de l'électricité.
pm-advanced-iron-processing=Des méthodes plus avancées de traiter le fer.
pm-advanced-copper-processing=Des méthodes plus avancées de traiter le cuivre.
pm-advanced-nickel-processing=Des méthodes plus avancées de traiter le nickel.
pm-advanced-zinc-processing=Des méthodes plus avancées de traiter le zinc.
pm-octane-fuel-canisters=Production de carburants plus avancés en utilisant des hydrocarbures, eux aussi, plus avancés.
pm-stronger-beacon-distribution=Réécrit une partie du code des diffuseurs de modules, permettant une distribution plus efficace.
pm-glass-ampules=Une manière de transporter les éléments dangereux. Peuvent être réutilisés une quasi-infinité de fois.
pm-strontium-fuel-rods=Un carburant plus efficace, à base de strontium.
pm-advanced-sand-processing=De meilleures méthodes de broyer la pierre et créer du verre.
pm-advanced-roboports=Des roboports plus puissant, chargeant plus rapidement plus de robots.
pm-roboport-repeaters=Des petits bâtiments étendant la couverture des robots, mais incapable de les stocker ou charger.
pm-advanced-copper-tin-solder=L'utilisation de faibles quantités d'autres éléments dans le métal de soudure cuivre-étain permet une production plus efficace.
pm-incendiary-rocketry=Des missiles qui laissent une flamme impossible à éteindre après leurs explosions.
pm-alkaline-earth-metal-pack-unlock=Le troisième et dernier pack de science de ce niveau.
pm-mangesium-chloride=Un composé très utile dans la création de panneaux solaires.
pm-stack-inserter=Bras robotisé empileur capable de remplir les convoyeurs de transport sur plusieurs niveaux.
pm-express-stack-inseter=Bras robotisé express empileur capable de remplir les convoyeurs de transport sur plusieurs niveaux rapidement.
pm-transport-belt-capacity=Permet l'empilage des objets, en utilisant des mathématiques avancées.
pm-longer-handed-inserter=Bras robotisé plus long, permettant des logistiques plus versatiles.
pm-ammonium-chloride-processing=La séparation du chlorure d'ammonium en des produits plus utiles.
pm-better-vanadium-oxide=Une méthode plus avancée de créer de l'oxyde de vanadium.
pm-basic-sulfuric-acid=Une méthode rudimentaire de créer de l'acide sulfurique, à base de soufre et de chlorures de métaux.
pm-coil-heater=Un échangeur à spirales sur une plaque de métal, qui booste les fours dans un rayon d'une tuile. Plusieurs donnent des rendements exponentiels.
pm-uhrlumin-processing=La création d'un alliage plus avancé, à base de magnésium, d'aluminium, de zinc, et d'autres éléments, en plus faibles quantités.
pm-lunar-panel-equipment=Un équipement modulaire extrêmement spécialisé, capable de fournir de l'énergie même la nuit, mais à un taux réduit.
pm-stronger-explosives=Augmente les dégâts des armes explosives.
pm-light-lubricant=Un meilleur lubrifiant qui permet la création de machines encore plus avancées.
pm-sideserters=Bras robotisés en forme de L, pour des usines plus compactes.
pm-osmium-flujd-handling=Des tuyaux plus résistants, permettant un plus gros débit, mais qui ne peuvent se connecter aux autres types tuyaux.
pm-inconel-625-processing=Un alliage spécialisé, plus complexe à créer, mais permet la création de meilleurs objets industriels.
pm-coke-processing=Méthodes industrielles permettant de produire du coke, à base de charbon, et utilisé dans plusieurs autres processus.
pm-advanced-coke-processing=Méthodes plus avancées pour extraire du coke du charbon et autres matériaux carboniques.
pm-experimental-research-data=Des cartes mémoire qui utilisent des éléments sous-recherchés pour débloquer de nouvelles technologies.
pm-lithium-battery-equipment=Des machines pour stocker de l'énergie pour les équipements modulaires.
pm-lithium-battery-mk2-equipment=Des machines pour stocker de l'énergie pour les équipements modulaires.
pm-selenium-battery-equipment=Des machines pour stocker de l'énergie pour les équipements modulaires.
pm-advanced-electric-engine-unit=Une manière plus avancée de transformer l'électricité en mouvement.
pm-advanced-modules=Des matériaux avancés, utilisé dans les modules avancés pour de meilleurs effets.
pm-naptha-fuel-canisters=Un bidon de carburant désigné pour être utilisé dans les machines, plutôt que les véhicules.
pm-acqua-molybdenum-porphyry-processing=utilisant des catalyseurs de rhénium pour créer plus efficacement du rhénium.
pm-advanced-octane-processing=Méthodes encore plus avancées pour produire des hydrocarbures d'octane.
pm-technectium-processing=Le premier élément synthétique produit, maintenant manufacturable par votre usine.
pm-advanced-molybdenum-processing=Des méthodes plus avancées de créer du molybdène, en utilisant du rhénium et du platine.
pm-lead-processing=Un métal pauvre dense et résistant aux radiations.
pm-RTG-equipment=Un réacteur GTR ne nécessitant pas de carburant pouvant être inséré dans vote grille d'équipement, mais il est moins efficace et prend plus de place.
pm-circuit-megassembler-MK2=La deuxième itération de la mégausine de circuits électroniques. Celle-ci est encore plus rapide, et présent une magnifique peinture verte (et pas jaune) !
pm-inserter-capacity-bonus=Permet aux bras robotisés haute capacité de déplacer davantage d'objets à la fois. Certaines des améliorations profitent également aux bras robotisés standards.
rocket-fuel=Du carburant pour fusée solide pour votre première fusée. Très puissant mais très dur à utiliser, il peut aussi être utilisé dans vos véhicules pour une très grande vitesse.
pm-specialised-crystal-growing=La possibilité de ne faire pousser qu'un type spécifique de cristal, en utilisant des cristaux germes et des dopants.
pm-satellite=Spécialisé pour survivre dans le vide spatial, il peut rechercher des technologies d'au-delà de cette planète.
pm-atmospheric-composition-research=Les recherches sur l'atmosphère de cette planète vous permettent de plus facilement lui voler ses ressources.
pm-heat-shielding=Un matériau composite qui peut résister à des températures élevées.
pm-high-density-structure=Un alliage fait à partir des métaux les plus denses, il peut résister à presque tout. Il est aussi extrêmement lourd.
pm-space-processing-units=Des circuits électroniques résistants au vide spatial, ils vous permettent d'envoyer plus facilement des choses au-delà de la dernière frontière.
pm-rocket-nozzle-parts=Une partie des matériaux nécessaire au lancement d'une fusée.
pm-rocket-cladding-parts=Une partie des matériaux nécessaire au lancement d'une fusée.
pm-liquid-rocket-fuel=Après avoir enfin atteint l'espace, vous savez maintenant comment produire de meilleurs (et moins dangereux) carburants pour y retourner.
pm-electronic-laser-etcher=Une machine avancée qui utilise des lasers pour produire très rapidement les circuits électroniques les plus avancés. Ou les plus rudimentaires d'il y a 80 heures.
pm-geothermal-bore-MK2=Une foreuse géothermique plus avancée, durant plus longtemps que son prédécesseur.
pm-advanced-processing-unit=Le circuit électronique le plus avancé, fait avec les matériaux les plus avancés.
pm-requester-chest-inventory-bonus-capacity=Permet aux robots de stocker plus de choses dans les coffres de demandes logistiques.
pm-laser-weapons-damage=Augmente les dégâts des armes à énergie et des rayons laser.
pm-laser-shooting-speed=Augmente la vitesse de tir des armes lasers.
pm-artillery-damage=Augmente les dégâts des tourelles d'artillerie.
pm-refined-flammables=Augmente les dégâts des armes incendiaires.
pm-follower-robot-count=Augmente le nombre de robots de combat qui peuvent vous suivre en même temps.
pm-atmospheric-condenser=Un condenseur atmosphérique plus avancé.
pm-geothermal-energy=En utilisant de la boue de forage et une foreuse, vous pouvez faire chauffer de l'eau sous terre, et l'utilisé pour générer de l'énergie.
pm-tidal-energy=Utilise la force des marées pour générer de l'énergie.
pm-selenium-battery-mk2-equipment=Des machines pour stocker de l'énergie pour les équipements modulaires.
pm-fluid-burning-energy=Génération d'énergie en brûlant des fluides.
pm-inert-gas-metallurgy=L'utilisation des gaz inertes en métallurgie permet la création de produits plus purs.
pm-acidic-water-processing=Un acide permettant de dissoudre les métaux les plus basiques, pour une métallurgie plus avancée.
pm-nitrobenzene-processing=Un carburant liquide qui peut être plus facilement brulé.
pm-beamcons=Diffuse les effets de modules depuis l'espace, permettant une couverture massive, au prix d'une faible efficacité, à cause de la diffusion de l'atmosphère.
pm-reusable-rocket-parts=Permet de recycler quelques parties de fusée après un décollage, grâce à des systèmes de guidage complexes.
pm-improved-reusable-rocket-part-unpacking=Des assembleurs plus adroits permet de limiter les chances de casse des parties de fusée survivantes.

pm-ferric-chloride-processing=Un composé de métal ferreux et de chlore, utilisé pour nettoyer les eaux usées ou dans des procédés acides.
pm-advanced-chlorine-processing=Une manière plus sophistiquée de créer de l'acide chlorhydrique, sans chlore ...
zirconia-processing=Un métal rouge foncé, utile pour les céramiques et les processus biologiques.

battery=Ce n'est ici que pour de prochaines mises à jour, si je ne voulais qu'un seul type de batterie, j'aurais changé cette technologie.

