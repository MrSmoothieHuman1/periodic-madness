pm-lithium-robot-speed-multiplier=ATTENTION : augmenter la vitesse n'est pas recommandé, et le mod n'est pas équilibré pour ça. Cette option n'est incluse que si vous pensez en avoir besoin pour profiter du mod. Cette option ne prend pas en compte la batterie des robots, qui perdent en efficacité plus ils sont rapides.
pm-circuit-colourblind-friendly-icons=Changes les icônes des circuits pour pouvoir être différentiables par autre chose que la couleur.
pm-building-module-extra-slots=Vous permet de retirer ou d'ajouter des emplacements de modules aux machines qui sont leurs propres modules. Cela n'affecte que les mégausines.

